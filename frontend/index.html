<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hostel Room Allocation</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <h1>Hostel Room Allocation</h1>
    <div>
      <button class="tab active" data-tab="setup" id="tab-setup">Setup</button>
      <button class="tab" data-tab="result" id="tab-result">Results</button>
      <button class="tab" data-tab="compare" id="tab-compare">Compare</button>
    </div>
  </div>
</header>

<main class="main">

  <!-- SETUP -->
  <section class="tab-content active" id="tab-content-setup">

    <div class="section">
      <h2>Rooms</h2>
      <div class="card">
        <div class="card-header">
          <span>Room List</span>
          <button id="add-room-btn">Add Room</button>
        </div>
        <div id="rooms-list"></div>
      </div>
    </div>

    <div class="section">
      <h2>Students</h2>
      <div class="card">
        <div class="card-header">
          <span>Student List</span>
          <button id="add-student-btn">Add Student</button>
        </div>
        <div id="students-list"></div>
      </div>
    </div>

    <div class="actions">
      <button id="run-btn" class="primary">Run Allocation</button>
      <button id="reset-btn">Reset</button>
    </div>

  </section>

  <!-- RESULTS -->
  <section class="tab-content" id="tab-content-result">

    <h2>Results</h2>

    <div class="stats">
      <div class="stat-box">
        <p>Allocated</p>
        <h3 id="stat-allocated"></h3>
      </div>
      <div class="stat-box">
        <p>Unallocated</p>
        <h3 id="stat-unallocated"></h3>
      </div>
      <div class="stat-box">
        <p>Satisfaction</p>
        <h3 id="stat-satisfaction"></h3>
      </div>
      <div class="stat-box">
        <p>Time</p>
        <h3 id="stat-time"></h3>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>CGPA</th>
          <th>Assigned Room</th>
        </tr>
      </thead>
      <tbody id="alloc-table-body"></tbody>
    </table>

  </section>

  <!-- COMPARE -->
  <section class="tab-content" id="tab-content-compare">

    <h2>Algorithm Comparison</h2>

    <table>
      <thead>
        <tr>
          <th>Metric</th>
          <th>Greedy</th>
          <th>Stable Matching</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Satisfaction</td>
          <td id="cmp-greedy-sat"></td>
          <td id="cmp-stable-sat"></td>
        </tr>
        <tr>
          <td>Unallocated</td>
          <td id="cmp-greedy-unalloc"></td>
          <td id="cmp-stable-unalloc"></td>
        </tr>
        <tr>
          <td>Execution Time</td>
          <td id="cmp-greedy-time"></td>
          <td id="cmp-stable-time"></td>
        </tr>
      </tbody>
    </table>

  </section>

</main>

<script src="app.js"></script>
</body>
</html>
